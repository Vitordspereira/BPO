spring.application.name=bpo

server.port=${PORT:8080}

# =====================
# BANCO DE DADOS
# =====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.hibernate.orm.sql.descriptor.binding=OFF

# =====================
# EMAIL
# =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# JWT
# =====================
api.security.token.secret=${JWT_SECRET}

# =====================
# MERCADO PAGO
# =====================
mercadopago.base-url=https://api.mercadopago.com
mercadopago.access-token=${MERCADO_PAGO_ACCESS_TOKEN}
mercadopago.webhook-secret=${MERCADO_PAGO_WEBHOOK_SECRET}
mercadopago.back-url=${MERCADO_PAGO_BACK_URL}

mercadopago.subscription-reason=Assessor BPO
mercadopago.subscription-monthly-amount=29.90
mercadopago.subscription-yearly-amount=299.90
mercadopago.currency-id=BRL

mercadopago.mock=false
mercadopago.mock-user-id=1