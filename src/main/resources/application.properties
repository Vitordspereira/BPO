spring.application.name=bpo

# Configuração do banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hds_bpo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=hubhds
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Essa linha abaixo ajuda a entender erros de banco de dados no console
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.sql.descriptor.binding=TRACE